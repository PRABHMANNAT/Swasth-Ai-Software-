<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swasth AI - Page Not Found</title>
    <meta
      name="description"
      content="This page needs a health check. Head back to Swasth AI to explore the platform and features."
    />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 40%),
          linear-gradient(180deg, #060606 0%, #000 100%);
        color: #fff;
        font-family: Inter, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 760px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 32px;
        padding: 40px;
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(18px);
        text-align: center;
      }

      .eyebrow {
        display: inline-flex;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.68);
      }

      h1 {
        margin: 24px 0 16px;
        font-size: clamp(2.2rem, 7vw, 4.4rem);
        line-height: 1.02;
        letter-spacing: -0.05em;
      }

      p {
        margin: 0 auto;
        max-width: 580px;
        font-size: 1rem;
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.64);
      }

      .actions {
        margin-top: 32px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 14px;
      }

      a {
        text-decoration: none;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 160px;
        padding: 14px 22px;
        border-radius: 999px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .button-primary {
        background: #fff;
        color: #000;
      }

      .button-secondary {
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
      }

      @media (max-width: 640px) {
        main {
          padding: 32px 22px;
          border-radius: 24px;
        }

        .actions {
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">404</div>
      <h1>This page needs a health check.</h1>
      <p>
        The page you're looking for doesn't exist or has been moved. Let's get you back to good health.
      </p>
      <div class="actions">
        <a class="button button-primary" href="/">Go Home</a>
        <a class="button button-secondary" href="/#all-features">Explore Features</a>
      </div>
    </main>
  </body>
</html>
